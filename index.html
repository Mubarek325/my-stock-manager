<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POWER-IMS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ========== THEMES ========== */
:root {
  --p:        #1a1aff;
  --p2:       #0a0a8f;
  --accent:   #00c2ff;
  --border:   #e2e8f0;
  --hdr-bg:   #f8fafc;
  --bg:       #f0f4f8;
  --surface:  #ffffff;
  --surface2: #f8fafc;
  --text:     #0f172a;
  --muted:    #64748b;
  --error:    #ef4444;
  --warn-bg:  #fff1f1;
  --ok-bg:    #f0fdf4;
  --ok-bdr:   #22c55e;
  --nav-bg:   #0f172a;
  --nav-btn:  #1e293b;
  --focus-bg: #eff6ff;
  --shadow:   0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);
  --shadow-lg:0 8px 32px rgba(0,0,0,.12);
  --radius:   10px;
  --font:     'DM Sans',sans-serif;
  --mono:     'DM Mono',monospace;
  --row-err:  rgba(239,68,68,.09);
}
[data-theme="dark"] {
  --p:        #818cf8;
  --p2:       #4f46e5;
  --accent:   #38bdf8;
  --border:   #334155;
  --hdr-bg:   #1e293b;
  --bg:       #0f172a;
  --surface:  #1e293b;
  --surface2: #162032;
  --text:     #f1f5f9;
  --muted:    #94a3b8;
  --error:    #f87171;
  --warn-bg:  #3b0f0f;
  --ok-bg:    #0f2a1a;
  --ok-bdr:   #22c55e;
  --nav-bg:   #020617;
  --nav-btn:  #1e293b;
  --focus-bg: #1e2a40;
  --shadow:   0 1px 3px rgba(0,0,0,.3),0 4px 16px rgba(0,0,0,.25);
  --shadow-lg:0 8px 32px rgba(0,0,0,.4);
  --row-err:  rgba(239,68,68,.13);
}

/* ========== RESET ========== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:13px;padding:0 0 72px;transition:background .2s,color .2s;}
input[type="date"]::-webkit-calendar-picker-indicator,
input[type="datetime-local"]::-webkit-calendar-picker-indicator{display:none;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--surface2);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

/* ========== HEADER ========== */
.app-header{
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(135deg,var(--p2) 0%,var(--p) 100%);
  color:#fff;padding:14px 20px;
  box-shadow:0 2px 20px rgba(26,26,255,.3);
  position:sticky;top:0;z-index:200;
}
.app-brand{display:flex;align-items:center;gap:10px;}
.brand-icon{width:36px;height:36px;background:rgba(255,255,255,.18);border-radius:8px;
  display:flex;align-items:center;justify-content:center;font-size:18px;}
.app-title{font-size:1.1rem;font-weight:700;letter-spacing:.06em;}
.app-user{font-size:.65rem;opacity:.75;margin-top:2px;letter-spacing:.02em;}

/* ========== SETTINGS MENU ========== */
.settings-wrap{position:relative;}
.settings-btn{
  width:38px;height:38px;border-radius:50%;border:none;
  background:rgba(255,255,255,.15);color:#fff;cursor:pointer;
  font-size:17px;display:inline-flex;align-items:center;justify-content:center;
  transition:background .18s,transform .18s;
}
.settings-btn:hover{background:rgba(255,255,255,.28);transform:rotate(22deg);}
.settings-menu{
  display:none;position:absolute;right:0;top:48px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);box-shadow:var(--shadow-lg);
  min-width:220px;overflow:hidden;z-index:300;
}
.settings-menu.open{display:block;animation:fadeIn .15s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.menu-item{
  width:100%;border:none;background:transparent;
  padding:11px 16px;text-align:left;cursor:pointer;
  font-family:var(--font);font-size:13px;color:var(--text);
  display:flex;align-items:center;gap:10px;transition:background .12s;
}
.menu-item:hover{background:var(--hdr-bg);}
.menu-section{padding:8px 16px 4px;font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;}
.menu-divider{border:none;border-top:1px solid var(--border);margin:4px 0;}
.menu-select{
  width:calc(100% - 32px);margin:2px 16px 10px;
  padding:7px 10px;border:1px solid var(--border);border-radius:6px;
  background:var(--surface2);color:var(--text);font-family:var(--font);font-size:12px;
}

/* ========== CONTENT AREA ========== */
.content{padding:14px 16px 0;}
@media(min-width:768px){.content{padding:18px 28px 0;}}

/* ========== SHEET CARD ========== */
.sheet-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
.sheet-card-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;border-bottom:2px solid var(--p);
  background:linear-gradient(90deg,var(--surface) 60%,var(--focus-bg));
}
.sheet-title{font-size:.95rem;font-weight:700;color:var(--p);text-transform:uppercase;letter-spacing:.05em;}
.tab-badge{
  font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;
  background:var(--p);color:#fff;letter-spacing:.04em;
}
.sheet-body{overflow-x:auto;}

/* ========== TABLE ========== */
table{width:100%;border-collapse:collapse;font-size:12.5px;table-layout:fixed;}
th,td{position:relative;border-bottom:1px solid var(--border);border-right:1px solid var(--border);padding:0;}
th:last-child,td:last-child{border-right:none;}
thead th{background:var(--hdr-bg);position:sticky;top:0;z-index:2;}
.hdr-inner{display:flex;flex-direction:column;}
.hdr-label{font-size:10px;font-weight:700;color:var(--muted);padding:8px 8px 2px;letter-spacing:.05em;text-transform:uppercase;}
.hdr-filter{
  border:none;border-top:1px solid var(--border);background:transparent;
  color:var(--text);padding:5px 8px;font-size:11px;outline:none;
  font-family:var(--font);width:100%;
}
.hdr-filter::placeholder{color:var(--border);}
.hdr-filter:focus,.hdr-filter:not(:placeholder-shown){background:var(--focus-bg);color:var(--p);font-weight:600;}
.resize-handle{position:absolute;right:0;top:0;width:4px;height:100%;cursor:col-resize;z-index:5;}

/* ========== CELL INPUTS ========== */
td input,td select{
  width:100%;border:none;padding:9px 8px;
  background:transparent;color:var(--text);
  font-family:var(--font);font-size:12.5px;outline:none;
}
td input.mono{font-family:var(--mono);}
td input:focus{background:var(--focus-bg);box-shadow:inset 0 0 0 2px var(--p);}
td input[readonly]{background:var(--surface2);color:var(--muted);cursor:not-allowed;}
td select{background:var(--surface);color:var(--text);}
td select:focus{outline:none;background:var(--focus-bg);}
.num{text-align:right;font-family:var(--mono);font-weight:500;}
.num-pad{padding-right:10px;}
.del-btn{
  color:var(--muted);background:none;border:none;cursor:pointer;
  font-size:16px;width:100%;text-align:center;padding:8px;
  transition:color .15s;
}
.del-btn:hover{color:var(--error);}

/* ========== ROW STATES ========== */
tr.row-incomplete td{background:var(--row-err);}
tr.row-incomplete td input{background:transparent;}
tr.row-incomplete td input:focus{background:var(--focus-bg);}
.stock-warn{color:var(--error);font-size:10px;padding:0 6px 4px;}
.summary-row td{background:linear-gradient(90deg,var(--ok-bg),var(--surface2));font-weight:700;font-family:var(--mono);}
.summary-label{padding:9px 10px;font-size:11px;letter-spacing:.04em;color:var(--muted);}

/* ========== BALANCE TAB ========== */
.bal-positive{color:#16a34a;font-weight:700;}
.bal-zero{color:var(--muted);}
.bal-negative{color:var(--error);font-weight:700;}

/* ========== REPORT ========== */
.report-label{padding:12px 16px;color:var(--muted);font-weight:500;}
.report-value{padding:12px 16px;text-align:right;font-weight:700;font-family:var(--mono);}
.report-total{background:linear-gradient(90deg,var(--ok-bg),var(--surface2));border-top:2px solid var(--ok-bdr);border-bottom:2px solid var(--ok-bdr);}
.report-total .report-label{color:var(--text);font-weight:700;}
.report-total .report-value{color:var(--ok-bdr);}
.credit-block{padding:12px 16px;font-size:12px;line-height:1.8;}
.credit-block b{color:var(--text);}
.date-range-bar{display:flex;gap:14px;flex-wrap:wrap;padding:14px 18px;background:var(--surface2);border-bottom:1px solid var(--border);}
.date-range-bar label{font-size:11px;font-weight:600;color:var(--muted);display:flex;align-items:center;gap:6px;}
.date-range-bar input{padding:5px 8px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);font-family:var(--font);font-size:12px;}

/* ========== BOTTOM NAV ========== */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--nav-bg);padding:8px 10px;
  display:flex;gap:5px;z-index:400;
  box-shadow:0 -2px 16px rgba(0,0,0,.3);
}
.nav-btn{
  flex:1;max-width:130px;padding:10px 4px;border:none;border-radius:6px;
  background:var(--nav-btn);color:#475569;cursor:pointer;
  font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;font-family:var(--font);
  transition:background .15s,color .15s;
}
.nav-btn:hover{background:#2d3f5a;color:#94a3b8;}
.nav-btn.active{background:var(--p);color:#fff;box-shadow:0 2px 8px rgba(26,26,255,.4);}

/* ========== MODALS ========== */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(3px);
  display:none;align-items:center;justify-content:center;z-index:600;
}
.modal-overlay.open{display:flex;}
.modal-box{
  background:var(--surface);border-radius:16px;
  width:min(440px,94vw);box-shadow:var(--shadow-lg);
  animation:slideUp .2s ease;
}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.modal-head{
  background:linear-gradient(135deg,var(--p2),var(--p));
  color:#fff;padding:20px 24px;border-radius:16px 16px 0 0;
}
.modal-head h2{font-size:1.1rem;font-weight:700;margin:0;}
.modal-body{padding:24px;}
.field{margin-bottom:14px;}
.field label{display:block;font-weight:600;margin-bottom:5px;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.05em;}
.field input,.field select{
  width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:8px;
  background:var(--surface2);color:var(--text);font-family:var(--font);font-size:14px;
  transition:border-color .15s;
}
.field input:focus,.field select:focus{outline:none;border-color:var(--p);}
.modal-btn{
  width:100%;padding:12px;border:none;border-radius:8px;
  background:var(--p);color:#fff;font-weight:700;cursor:pointer;font-size:14px;
  transition:opacity .15s;margin-top:6px;font-family:var(--font);
}
.modal-btn:hover{opacity:.88;}
.modal-btn.secondary{background:var(--surface2);color:var(--muted);border:1px solid var(--border);}
.modal-link{margin-top:14px;text-align:center;font-size:12.5px;color:var(--muted);}
.modal-link a{color:var(--p);cursor:pointer;font-weight:600;}
.modal-error{margin-top:10px;color:var(--error);font-size:12px;min-height:16px;}

/* ========== PERMISSIONS MODAL ========== */
.user-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);}
.perm-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px;}
.perm-tag{font-size:10px;font-weight:700;padding:4px 8px;border-radius:5px;background:var(--surface2);color:var(--muted);border:1px solid var(--border);}
.perm-tag.active{background:var(--p);color:#fff;border-color:var(--p);}
.perm-select{font-size:11px;padding:4px 6px;border:1px solid var(--border);border-radius:5px;background:var(--surface);color:var(--text);font-family:var(--font);}

/* ========== PRINT ========== */
@media print{
  .app-header,.bottom-nav,.settings-menu,.date-range-bar,.no-print,
  .del-btn,.hdr-filter{display:none!important;}
  body{padding:0;background:white;}
  .content{padding:0;}
  .sheet-card{box-shadow:none;border:1px solid #ccc;}
  #report-print-area{display:block!important;}
  .print-only{display:block!important;}
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
}
#report-print-area{display:none;}
</style>
</head>
<body oncontextmenu="showCtxMenu(event)">

      <button class="menu-item" onclick="openChangePass();closeMenu()">🔑 Change Password</button>

</div>

<!-- ====== CONTEXT MENU ====== -->
<div id="ctx-menu" style="display:none;position:fixed;z-index:700;background:var(--surface);border:1px solid var(--border);border-radius:8px;box-shadow:var(--shadow-lg);min-width:160px;overflow:hidden;">
  <div style="padding:6px 0;">
    <div class="menu-section">Export as PDF</div>
    <button class="menu-item" onclick="exportPDF('PURCHASE');hideCtx()">📄 Purchase</button>
    <button class="menu-item" onclick="exportPDF('SALES');hideCtx()">📄 Sales</button>
    <button class="menu-item" onclick="exportPDF('BALANCE');hideCtx()">📄 Balance</button>
    <button class="menu-item" onclick="exportPDF('EXPENSE');hideCtx()">📄 Expense</button>
  </div>
</div>

<!-- ====== AUTH MODAL ====== -->
<div class="modal-overlay open" id="auth-modal">
  <div class="modal-box">
    <div class="modal-head"><h2 id="auth-title">POWER-IMS Login</h2></div>
    <div class="modal-body">
      <div class="field"><label>Username</label><input id="auth-user" autocomplete="username" onkeydown="if(e.key==='Enter')document.getElementById('auth-pass').focus()"></div>

        <label>Confirm Password</label>
        <input id="auth-confirm" type="password" onkeydown="if(event.key==='Enter')submitAuth()">
      </div>
      <button class="modal-btn" onclick="submitAuth()" id="auth-submit-btn">Log In</button>
      <div class="modal-link">
        <span id="auth-toggle-hint">Don't have an account?</span>
        <a onclick="toggleAuthMode()" id="auth-toggle-link"> Sign Up</a>
      </div>
      <div class="modal-error" id="auth-error"></div>
    </div>
  </div>
</div>

<!-- ====== CHANGE PASSWORD MODAL ====== -->
<div class="modal-overlay" id="pass-modal">
  <div class="modal-box">
    <div class="modal-head"><h2>Change Password</h2></div>
    <div class="modal-body">
      <div class="field"><label>Current Password</label><input id="cp-current" type="password"></div>
      <div class="field"><label>New Password</label><input id="cp-new" type="password"></div>
      <div class="field"><label>Confirm New Password</label><input id="cp-confirm" type="password"></div>
      <button class="modal-btn" onclick="submitChangePass()">Save</button>
      <button class="modal-btn secondary" onclick="closeModal('pass-modal')">Cancel</button>
      <div class="modal-error" id="cp-error"></div>
    </div>
  </div>
</div>

<!-- ====== PERMISSIONS MODAL (admin only) ====== -->
<div class="modal-overlay" id="perm-modal">
  <div class="modal-box" style="max-height:90vh;overflow-y:auto;">
    <div class="modal-head"><h2>👥 User Permissions</h2></div>
    <div class="modal-body" id="perm-body"></div>
  </div>
</div>

<!-- ====== EXPORT/PRINT AREA ====== -->
<div id="report-print-area"></div>

<!-- ====== DATALISTS ====== -->

<datalist id="item-list"></datalist>

<!-- ====== MAIN CONTENT ====== -->
<div class="content" id="content" style="display:none">
  <div class="sheet-card">
    <div class="sheet-card-head">
      <span class="sheet-title" id="sheet-title">Items</span>
      <span class="tab-badge" id="tab-badge">ITEMS</span>
    </div>
    <div class="sheet-body">
      <table id="data-table"><thead id="thead"></thead><tbody id="tbody"></tbody></table>
    </div>
    <div id="extras"></div>
  </div>
</div>

<!-- ====== BOTTOM NAV ====== -->
<div class="bottom-nav" id="bottom-nav" style="display:none">
  <button class="nav-btn" data-tab="PURCHASE" onclick="switchTab('PURCHASE')">Purchase</button>
  <button class="nav-btn" data-tab="SALES"    onclick="switchTab('SALES')">Sales</button>
  <button class="nav-btn" data-tab="BALANCE"  onclick="switchTab('BALANCE')">Balance</button>
  <button class="nav-btn" data-tab="EXPENSE"  onclick="switchTab('EXPENSE')">Expense</button>
  <button class="nav-btn" data-tab="REPORT"   onclick="switchTab('REPORT')">Report</button>
</div>

<script>
/* ======================================================
   CONSTANTS & HELPERS
====================================================== */
const ADMIN = 'admin';
const TABS  = ['PURCHASE','SALES','BALANCE','EXPENSE','REPORT'];
// Permission levels per tab: 'full' | 'add_only' | 'read' | 'none'
const DEFAULT_PERMS = { ITEMS:'full', PURCHASE:'full', SALES:'full', BALANCE:'full', EXPENSE:'full', REPORT:'full' };

const fmt  = n => (parseFloat(n)||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtQ = n => (parseFloat(n)||0).toLocaleString();
const esc  = s => String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const now  = () => new Date(Date.now()-new Date().getTimezoneOffset()*60000).toISOString().slice(0,16);
const sum  = (arr, fn) => arr.reduce((a,b)=>a+(fn(b)||0), 0);

/* ======================================================
   STORAGE REGISTRY
====================================================== */
const getRegistry = () => JSON.parse(localStorage.getItem('ims_reg') || '{}');
const saveRegistry = r => localStorage.setItem('ims_reg', JSON.stringify(r));
const uKey = (u,k) => `ims_${u}_${k}`;

/* ======================================================
   BLANK ROW FACTORIES
====================================================== */
const blankPurchase = () => ({id:'',name:'',desc:'',date:now(),party:'Supplier',qty:'',uPrice:'',status:'CASH'});
const blankSales    = () => ({id:'',name:'',desc:'',date:now(),party:'Customer',qty:'',sPrice:'',status:'CASH'});
const blankExpense  = () => ({date:now(),reason:'',amt:''});
const blankItem     = () => ({id:'',name:'',desc:''});

/* ======================================================
   APP STATE
====================================================== */
const S = {
  user:null, tab:'ITEMS', theme:'light', lang:'en', filters:{},
  items:[], purchase:[], sales:[], expense:[], beginBal:0,
  reportRange:{from:'',to:''},
  perms: {} // {username: {ITEMS:'full', PURCHASE:'full', ...}}
};

/* ======================================================
   USER DATA LOAD / SAVE
====================================================== */
function loadUserData(u) {
  S.items    = JSON.parse(localStorage.getItem(uKey(u,'items'))    || JSON.stringify([blankItem()]));
  S.purchase = JSON.parse(localStorage.getItem(uKey(u,'purchase')) || JSON.stringify([blankPurchase()]));
  S.sales    = JSON.parse(localStorage.getItem(uKey(u,'sales'))    || JSON.stringify([blankSales()]));
  S.expense  = JSON.parse(localStorage.getItem(uKey(u,'expense'))  || JSON.stringify([blankExpense()]));
  S.beginBal = parseFloat(localStorage.getItem(uKey(u,'beginBal')) || '0');
  S.perms    = JSON.parse(localStorage.getItem('ims_perms')        || '{}');
}
function saveUserData() {
  if (!S.user) return;
  const u = S.user;
  localStorage.setItem(uKey(u,'items'),    JSON.stringify(S.items));
  localStorage.setItem(uKey(u,'purchase'), JSON.stringify(S.purchase));
  localStorage.setItem(uKey(u,'sales'),    JSON.stringify(S.sales));
  localStorage.setItem(uKey(u,'expense'),  JSON.stringify(S.expense));

/* ======================================================
   ROWS HELPER
====================================================== */
function rows() {
  if (S.tab==='ITEMS')    return S.items;
  if (S.tab==='PURCHASE') return S.purchase;
  if (S.tab==='SALES')    return S.sales;
  if (S.tab==='EXPENSE')  return S.expense;
  return [];
}
function pushBlankRow() {
  if (S.tab==='ITEMS')    S.items.push(blankItem());
  if (S.tab==='PURCHASE') S.purchase.push(blankPurchase());
  if (S.tab==='SALES')    S.sales.push(blankSales());
  if (S.tab==='EXPENSE')  S.expense.push(blankExpense());
}
function ensureTrailing() {
  if (!rows().length) pushBlankRow();
}

/* ======================================================
   FIFO HELPERS
====================================================== */
function fifoCost(itemId, qty, beforeIdx) {
  if (!itemId || qty<=0) return 0;
  let buys = S.purchase.filter(p=>p.id===itemId)
    .sort((a,b)=>new Date(a.date)-new Date(b.date))
    .map(p=>({...p,rem:parseFloat(p.qty)||0}));
  let sold = S.sales.filter((s,i)=>s.id===itemId&&i<beforeIdx).reduce((a,b)=>a+(parseFloat(b.qty)||0),0);
  for(const b of buys){const t=Math.min(b.rem,sold);b.rem-=t;sold-=t;}
  let cost=0,need=qty;
  for(const b of buys){if(!need)break;const t=Math.min(b.rem,need);cost+=t*(parseFloat(b.uPrice)||0);need-=t;}
  return cost;
}
function fifoBuyPrice(itemId, qty, beforeIdx) {
  if (!itemId || qty<=0) return 0;
  let buys = S.purchase.filter(p=>p.id===itemId)
    .sort((a,b)=>new Date(a.date)-new Date(b.date))
    .map(p=>({...p,rem:parseFloat(p.qty)||0}));
  let sold = S.sales.filter((s,i)=>s.id===itemId&&i<beforeIdx).reduce((a,b)=>a+(parseFloat(b.qty)||0),0);
  for(const b of buys){const t=Math.min(b.rem,sold);b.rem-=t;sold-=t;}
  let need=qty,price=0;
  for(const b of buys){if(!need)break;const t=Math.min(b.rem,need);price=parseFloat(b.uPrice)||0;need-=t;}
  return price;
}

let authMode='login';
function toggleAuthMode() {
  authMode = authMode==='login'?'signup':'login';
  const isS = authMode==='signup';
  document.getElementById('auth-title').textContent    = isS ? 'Create Account' : 'POWER-IMS Login';
  document.getElementById('auth-submit-btn').textContent = isS ? 'Sign Up' : 'Log In';
  document.getElementById('auth-confirm-wrap').style.display = isS?'':'none';
  document.getElementById('auth-toggle-hint').textContent  = isS ? 'Have an account?' : "Don't have an account?";
  document.getElementById('auth-toggle-link').textContent  = isS ? ' Log In' : ' Sign Up';
  document.getElementById('auth-error').textContent='';
}
function submitAuth() {
  const u=document.getElementById('auth-user').value.trim();
  const p=document.getElementById('auth-pass').value;
  const err=document.getElementById('auth-error');
  if(!u||!p){err.textContent='Please enter username and password.';return;}
  const reg=getRegistry();
  if(authMode==='login') {
    if(!reg[u]||reg[u]!==p){err.textContent='Invalid username or password.';return;}
    doLogin(u);
  } else {
    const c=document.getElementById('auth-confirm').value;
    if(reg[u]){err.textContent='Username already taken.';return;}
    if(p!==c){err.textContent='Passwords do not match.';return;}
    if(p.length<4){err.textContent='Password must be at least 4 characters.';return;}
    reg[u]=p;
    saveRegistry(reg);
    doLogin(u);
  }
}
function doLogin(u) {
  S.user=u;
  localStorage.setItem('ims_currentUser',u);
  loadUserData(u);
  loadUserPrefs(u);
  document.getElementById('user-label').textContent=`User: ${u}`;
  // Show admin-only items
  document.getElementById('admin-perms-btn').style.display=isAdmin()?'flex':'none';
  closeModal('auth-modal');
  showUI();
  // Determine first accessible tab
  let startTab='ITEMS';
  if(!isAdmin()) {
    for(const t of ['ITEMS','PURCHASE','SALES','BALANCE','EXPENSE','REPORT']) {
      if(getPerm(t)!=='none'){startTab=t;break;}
    }
  }
  switchTab(startTab);
}
function logout() {
  saveUserData();
  S.user=null;
  localStorage.removeItem('ims_currentUser');
  closeMenu();
  hideUI();
  authMode='login';
  ['auth-user','auth-pass','auth-confirm'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('auth-confirm-wrap').style.display='none';
  document.getElementById('auth-submit-btn').textContent='Log In';
  document.getElementById('auth-title').textContent='POWER-IMS Login';
  document.getElementById('auth-toggle-hint').textContent="Don't have an account?";
  document.getElementById('auth-toggle-link').textContent=' Sign Up';
  document.getElementById('auth-error').textContent='';
  openModal('auth-modal');
}

function makeHdr(label,field,cls=''){
  const filter=field
    ?`<input class="hdr-filter" placeholder="Filter…" value="${esc(S.filters[field]||'')}"
        oninput="S.filters['${field}']=this.value.toLowerCase();renderTable()">`

/* ======================================================
   COLUMN RESIZE
====================================================== */
let _rz={};
function startResize(e,h){
  e.preventDefault();
  _rz.th=h.parentElement;_rz.startX=e.clientX;_rz.startW=_rz.th.offsetWidth;
  _rz.idx=Array.from(_rz.th.parentElement.children).indexOf(_rz.th);
  _rz.table=_rz.th.closest('table');
  document.addEventListener('mousemove',doResize);
  document.addEventListener('mouseup',stopResize);
}
function doResize(e){
  if(!_rz.th)return;
  const w=Math.max(50,_rz.startW+e.clientX-_rz.startX);
  Array.from(_rz.table.rows).forEach(r=>{if(r.children[_rz.idx])r.children[_rz.idx].style.width=w+'px';});
}
function stopResize(){
  document.removeEventListener('mousemove',doResize);
  document.removeEventListener('mouseup',stopResize);
  _rz={};
}

/* ======================================================
   ROW HANDLERS
====================================================== */
function handleInput(idx,field,val){
  const list=rows();
  if(['qty','uPrice','sPrice','amt'].includes(field)){
    list[idx][field]=val===''?'':parseFloat(val)||0;
  } else {
    list[idx][field]=val;
  }
  if(field==='id'){saveUserData();return;}
  if(idx===list.length-1){pushBlankRow();saveUserData();renderTable();}
  else{saveUserData();refreshTotal(idx);}
}
function validateAndLink(idx,val){
  if(!val)return;
  const item=S.items.find(m=>m.id===val);
  if(!item){
    alert(`Part Number "${val}" not found in Items.`);
    rows()[idx].id='';rows()[idx].name='';rows()[idx].desc='';
  } else {
    rows()[idx].name=item.name;rows()[idx].desc=item.desc;
    if(idx===rows().length-1)pushBlankRow();
  }
  saveUserData();renderTable();
}
function deleteRow(idx){
  if(!confirm('Delete this row?'))return;
  rows().splice(idx,1);
  ensureTrailing();
  saveUserData();renderTable();
}
function refreshTotal(idx){
  const row=rows()[idx],qty=parseFloat(row.qty)||0;
  let v=0;
  if(S.tab==='PURCHASE')v=qty*(parseFloat(row.uPrice)||0);
  else v=qty*(parseFloat(row.sPrice)||0)-fifoCost(row.id,qty,idx);
  const c=document.getElementById(`tt_${idx}`);
  if(c)c.textContent=fmt(v);
}

/* ======================================================
   RENDER
====================================================== */
function renderTable(){
  const thead=document.getElementById('thead');
  const tbody=document.getElementById('tbody');
  const extras=document.getElementById('extras');
  thead.innerHTML='';tbody.innerHTML='';extras.innerHTML='';

  if(S.tab==='ITEMS')         renderItems(thead,tbody);
  else if(S.tab==='PURCHASE'||S.tab==='SALES') renderTx(thead,tbody);
  else if(S.tab==='BALANCE')  renderBalance(thead,tbody,extras);
  else if(S.tab==='EXPENSE')  renderExpense(thead,tbody);
  else if(S.tab==='REPORT')   renderReport(thead,tbody,extras);
}

/* --- ITEMS --- */
function renderItems(thead,tbody){
  const rw=canWrite('ITEMS');
  thead.innerHTML=`<tr>
    ${rw?'<th style="width:38px"></th>':''}
    ${makeHdr('PART NUMBER','id')}
    ${makeHdr('ITEM NAME','name')}
    ${makeHdr('DESCRIPTION','desc')}
  </tr>`;
  S.items.forEach((row,i)=>{
    if(S.filters.id   && !row.id.toLowerCase().includes(S.filters.id))   return;
    if(S.filters.name && !row.name.toLowerCase().includes(S.filters.name)) return;
    const dup=row.id&&S.items.filter((r,j)=>r.id===row.id&&j!==i).length>0;
    const tr=document.createElement('tr');
    if(!rw) tr.style.pointerEvents='none';
    tr.innerHTML=`
      ${rw?`<td><button class="del-btn no-print" onclick="deleteRow(${i})">×</button></td>`:''}
      <td><input value="${esc(row.id)}" style="${dup?'background:var(--warn-bg);color:var(--error)':''}"
            oninput="S.items[${i}].id=this.value;saveUserData()"
            onblur="if(S.items[${i}].id&&${i}===S.items.length-1){pushBlankRow();renderTable()}"
            ${!rw?'readonly':''}></td>
      <td><input value="${esc(row.name)}" oninput="handleInput(${i},'name',this.value)" ${!rw?'readonly':''}></td>
      <td><input value="${esc(row.desc)}" oninput="handleInput(${i},'desc',this.value)" ${!rw?'readonly':''}></td>`;
    tbody.appendChild(tr);
  });
}

/* --- PURCHASE / SALES --- */
function renderTx(thead,tbody){
  const isP=S.tab==='PURCHASE';
  const perm=getPerm(S.tab);
  const rw=canWrite(S.tab);
  const addOnly=perm==='add_only';

  // For add_only: only show the last (blank) row
  const list=(isP?S.purchase:S.sales);
  const visibleRows=addOnly ? [list[list.length-1]].filter(Boolean) : list;
  const idxOffset=addOnly ? list.length-1 : 0;

  const salesHdrs=isP?'':`
    ${makeHdr('PRICE','',         'num')}
    ${makeHdr('TOTAL PRICE','',   'num')}
    ${makeHdr('PURCH. PRICE','',  'num')}
    ${makeHdr('TOTAL PURCH.','',  'num')}`;

  thead.innerHTML=`<tr>
    ${rw?'<th style="width:38px"></th>':''}
    ${makeHdr('DATE','date')}
    ${makeHdr(isP?'SUPPLIER':'CUSTOMER','party')}
    ${makeHdr('PART NO.','id')}
    ${makeHdr('NAME','name')}
    ${makeHdr('DESC','desc')}
    ${makeHdr('QTY','', 'num')}
    ${isP?makeHdr('U.PRICE','','num')+makeHdr('TOTAL','','num'):salesHdrs}
    ${makeHdr('STATUS','status')}
  </tr>`;

  let totQty=0,totVal=0;

  visibleRows.forEach((row,vi)=>{
    const i=idxOffset+vi;
    if(Object.keys(S.filters).some(f=>S.filters[f]&&!String(row[f]||'').toLowerCase().includes(S.filters[f])))return;

    const qty  =parseFloat(row.qty)  ||0;
    const price=parseFloat(isP?row.uPrice:row.sPrice)||0;
    const rowTotal=isP ? qty*price : qty*price-fifoCost(row.id,qty,i);
    totQty+=qty; totVal+=rowTotal;

    // Incomplete row check — must have id, qty, price
    const incomplete=row.id&&(!row.qty||!price);

    let stockWarn='';
    if(!isP&&row.id){
      const inQ=S.purchase.filter(p=>p.id===row.id).reduce((a,b)=>a+(parseFloat(b.qty)||0),0);
      const outQ=S.sales.filter((s,j)=>s.id===row.id&&j<i).reduce((a,b)=>a+(parseFloat(b.qty)||0),0);
      if(qty>inQ-outQ)stockWarn=`<div class="stock-warn">⚠ Not enough stock</div>`;
    }

    let extraCells='';
    if(isP){
      extraCells=`
        <td class="num"><input id="cell_p_${i}" type="number" class="num mono" value="${row.uPrice===''?'':row.uPrice}"
              oninput="handleInput(${i},'uPrice',this.value)" ${!rw?'readonly':''}></td>
        <td class="num num-pad" id="tt_${i}">${fmt(rowTotal)}</td>`;
    } else {
      const pp=fifoBuyPrice(row.id,qty,i);
      extraCells=`
        <td class="num"><input id="cell_p_${i}" type="number" class="num mono" value="${row.sPrice===''?'':row.sPrice}"
              oninput="handleInput(${i},'sPrice',this.value)" ${!rw?'readonly':''}></td>
        <td class="num num-pad">${fmt(qty*price)}</td>
        <td class="num num-pad">${fmt(pp)}</td>
        <td class="num num-pad">${fmt(qty*(pp||0))}</td>`;
    }

    const tr=document.createElement('tr');
    if(incomplete) tr.className='row-incomplete';
    tr.innerHTML=`
      ${rw?`<td><button class="del-btn no-print" onclick="deleteRow(${i})">×</button></td>`:''}
      <td><input type="datetime-local" value="${row.date||''}" oninput="handleInput(${i},'date',this.value)" ${!rw?'readonly':''}></td>
      <td><input list="party-list" value="${esc(row.party||'')}" oninput="handleInput(${i},'party',this.value)" ${!rw?'readonly':''}></td>
      <td><input list="item-list" value="${esc(row.id||'')}"
            oninput="${isP?'S.purchase':'S.sales'}[${i}].id=this.value"
            onchange="validateAndLink(${i},this.value)" ${!rw?'readonly':''}></td>
      <td><input value="${esc(row.name||'')}" readonly tabindex="-1"></td>
      <td><input value="${esc(row.desc||'')}" readonly tabindex="-1"></td>
      <td class="num"><input type="number" class="num mono" value="${row.qty===''?'':row.qty}"
            oninput="handleInput(${i},'qty',this.value)" ${!rw?'readonly':''}></td>
      ${extraCells}
      <td>
        <select onchange="handleInput(${i},'status',this.value)" ${!rw?'disabled':''}>
          <option value="CASH"   ${row.status==='CASH'  ?'selected':''}>CASH</option>
          <option value="CREDIT" ${row.status==='CREDIT'?'selected':''}>CREDIT</option>
        </select>${stockWarn}
      </td>`;
    tbody.appendChild(tr);
  });

  if(!addOnly){
    const span=isP?6:10;
    const sr=document.createElement('tr');
    sr.className='summary-row';
    sr.innerHTML=`
      ${rw?'<td></td>':''}
      <td class="summary-label" colspan="${span}">TOTALS</td>
      <td class="num num-pad">${fmtQ(totQty)}</td>
      <td></td>
      <td class="num num-pad">${fmt(totVal)}</td>
      ${!isP?'<td></td>':''}`;
    tbody.appendChild(sr);
  }
}

/* --- BALANCE --- */
function renderBalance(thead,tbody,extras){
  thead.innerHTML=`<tr>
    ${makeHdr('PART NO.','id')}
    ${makeHdr('NAME','name')}
    ${makeHdr('DESCRIPTION','desc')}
    <th class="num"><div class="hdr-inner"><span class="hdr-label">PURCHASE</span></div></th>
    <th class="num"><div class="hdr-inner"><span class="hdr-label">SALES</span></div></th>
    <th class="num"><div class="hdr-inner"><span class="hdr-label">BALANCE</span></div></th>
    <th class="num"><div class="hdr-inner"><span class="hdr-label">PRICE</span></div></th>
  </tr>`;
  let totalV=0;
  S.items.filter(m=>m.id).forEach(item=>{
    if(S.filters.id   && !item.id.toLowerCase().includes(S.filters.id))   return;
    if(S.filters.name && !item.name.toLowerCase().includes(S.filters.name)) return;
    const inQ  =S.purchase.filter(p=>p.id===item.id).reduce((a,b)=>a+(parseFloat(b.qty)||0),0);
    const outQ =S.sales.filter(s=>s.id===item.id).reduce((a,b)=>a+(parseFloat(b.qty)||0),0);
    const stock=inQ-outQ;
    const cost =S.purchase.filter(p=>p.id===item.id).reduce((a,b)=>a+(b.qty||0)*(b.uPrice||0),0);
    const avg  =inQ>0?cost/inQ:0;
    totalV+=stock*avg;
    const balClass=stock>0?'bal-positive':stock===0?'bal-zero':'bal-negative';
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td style="padding:9px 8px;font-family:var(--mono);font-size:12px">${esc(item.id)}</td>
      <td style="padding:9px 8px;font-weight:600">${esc(item.name)}</td>
      <td style="padding:9px 8px;color:var(--muted);font-size:12px">${esc(item.desc)}</td>
      <td class="num num-pad">${fmtQ(inQ)}</td>
      <td class="num num-pad">${fmtQ(outQ)}</td>
      <td class="num num-pad ${balClass}">${fmtQ(stock)}</td>
      <td class="num num-pad">${fmt(stock*avg)}</td>`;
    tbody.appendChild(tr);
  });
  extras.innerHTML=`<div style="background:var(--ok-bg);padding:14px 18px;
    border-top:2px solid var(--ok-bdr);display:flex;justify-content:space-between;
    font-weight:700;font-family:var(--mono)">
    <span style="font-family:var(--font);color:var(--muted)">TOTAL INVENTORY VALUE</span>
    <span style="color:var(--ok-bdr)">${fmt(totalV)}</span>
  </div>`;
}

/* --- EXPENSE --- */
function renderExpense(thead,tbody){
  const rw=canWrite('EXPENSE');
  thead.innerHTML=`<tr>
    ${rw?'<th style="width:38px"></th>':''}
    ${makeHdr('DATE','date')}
    ${makeHdr('REASON','reason')}
    <th class="num"><div class="hdr-inner"><span class="hdr-label">AMOUNT</span></div></th>
  </tr>`;
  let total=0;
  S.expense.forEach((row,i)=>{
    total+=parseFloat(row.amt)||0;
    const tr=document.createElement('tr');
    tr.innerHTML=`
      ${rw?`<td><button class="del-btn no-print" onclick="deleteRow(${i})">×</button></td>`:''}
      <td><input type="datetime-local" value="${row.date||''}" oninput="handleInput(${i},'date',this.value)" ${!rw?'readonly':''}></td>
      <td><input value="${esc(row.reason||'')}" oninput="handleInput(${i},'reason',this.value)" ${!rw?'readonly':''}></td>
      <td class="num"><input type="number" class="num mono" value="${row.amt===''?'':row.amt}"
            oninput="handleInput(${i},'amt',this.value)" ${!rw?'readonly':''}></td>`;
    tbody.appendChild(tr);
  });
  const sr=document.createElement('tr');
  sr.className='summary-row';
  sr.innerHTML=`${rw?'<td></td>':''}
    <td class="summary-label" colspan="2">TOTAL EXPENSES</td>
    <td class="num num-pad">${fmt(total)}</td>`;
  tbody.appendChild(sr);
}

/* --- REPORT --- */
function renderReport(thead,tbody,extras){
  thead.innerHTML=`<tr style="background:linear-gradient(90deg,var(--p2),var(--p))">
    <th colspan="2" style="padding:16px 18px;text-align:center;color:#fff;font-size:14px;font-weight:700;letter-spacing:.06em">
      FINANCIAL SUMMARY
      <button onclick="printReport()" class="no-print" style="float:right;padding:5px 14px;font-size:11px;
        border-radius:6px;border:none;background:rgba(255,255,255,.2);color:#fff;cursor:pointer;font-weight:700">
        🖨 Print
      </button>
    </th>
  </tr>`;

  extras.innerHTML=`<div class="date-range-bar no-print">
    <label>From: <input type="date" value="${S.reportRange.from}" onchange="S.reportRange.from=this.value;renderTable()"></label>
    <label>To:   <input type="date" value="${S.reportRange.to}"   onchange="S.reportRange.to=this.value;renderTable()"></label>
  </div>`;

  const inRange=arr=>arr.filter(r=>{
    if(!r.date)return true;
    const d=r.date.slice(0,10);
    if(S.reportRange.from&&d<S.reportRange.from)return false;
    if(S.reportRange.to&&d>S.reportRange.to)return false;
    return true;
  });

  const PR=inRange(S.purchase),SR=inRange(S.sales),ER=inRange(S.expense);
  const tPC=sum(PR.filter(p=>p.status==='CASH'),  p=>(p.qty||0)*(p.uPrice||0));
  const tPCr=sum(PR.filter(p=>p.status==='CREDIT'),p=>(p.qty||0)*(p.uPrice||0));
  const tSC=sum(SR.filter(s=>s.status==='CASH'),  s=>(s.qty||0)*(s.sPrice||0));
  const tSCr=sum(SR.filter(s=>s.status==='CREDIT'),s=>(s.qty||0)*(s.sPrice||0));
  const tE=sum(ER,r=>parseFloat(r.amt));
  const net=tSC+tSCr-tPC-tPCr-tE;
  const coh=S.beginBal+tSC-tPC-tE;

  const rows2=[
    {l:'Initial Cash Balance', v:S.beginBal, edit:true},
    {l:'Total Purchases — Credit', v:tPCr},
    {l:'Total Purchases — Cash',   v:tPC},
    {l:'Total Sales — Cash',       v:tSC},
    {l:'Total Sales — Credit',     v:tSCr},
    {l:'Total Expenses',           v:tE},
    {l:'Net Profit / Loss',        v:net,  total:true},
    {l:'Cash on Hand',             v:coh,  total:true},
  ];
  rows2.forEach(r=>{
    const tr=document.createElement('tr');
    tr.className=r.total?'report-total':'';
    tr.innerHTML=`
      <td class="report-label">${r.l}</td>
      <td class="report-value">${r.edit
        ?`<input type="number" class="mono" style="text-align:right;font-weight:700;width:140px;
             padding:5px 8px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);color:var(--text)"
             value="${r.v}" onchange="S.beginBal=parseFloat(this.value)||0;saveUserData();renderTable()">`
        :fmt(r.v)}</td>`;
    tbody.appendChild(tr);
  });

  // Credit breakdowns
  const groupBy=(arr,kf,vf)=>arr.reduce((a,r)=>{const k=kf(r);a[k]=(a[k]||0)+vf(r);return a;},{});
  const cp=PR.filter(p=>p.status==='CREDIT'&&p.party);
  const cs=SR.filter(s=>s.status==='CREDIT'&&s.party);
  if(cp.length){
    const g=groupBy(cp,p=>p.party,p=>(p.qty||0)*(p.uPrice||0));
    const tr=document.createElement('tr');
    tr.innerHTML=`<td colspan="2" class="credit-block">
      <b style="color:var(--p)">Purchases on Credit — by Supplier:</b><br>
      ${Object.entries(g).map(([k,v])=>`<span style="color:var(--muted)">${esc(k)}</span> — <b>${fmt(v)}</b>`).join('<br>')}
    </td>`;
    tbody.appendChild(tr);
  }
  if(cs.length){
    const g=groupBy(cs,s=>s.party,s=>(s.qty||0)*(s.sPrice||0));
    const tr=document.createElement('tr');
    tr.innerHTML=`<td colspan="2" class="credit-block">
      <b style="color:var(--p)">Sales on Credit — by Customer:</b><br>
      ${Object.entries(g).map(([k,v])=>`<span style="color:var(--muted)">${esc(k)}</span> — <b>${fmt(v)}</b>`).join('<br>')}
    </td>`;
    tbody.appendChild(tr);
  }
}

====================================================== */

  // Build a clean print-only version
  const pa=document.getElementById('report-print-area');
  const thead=document.getElementById('thead');
  const tbody=document.getElementById('tbody');
  pa.innerHTML=`<style>
    @media print{body *{visibility:hidden}#report-print-area,#report-print-area *{visibility:visible}}

    table{width:100%;border-collapse:collapse;}
    th,td{border:1px solid #ccc;padding:10px 14px;}
    thead tr th{background:#1a1aff;color:white;font-size:14px;}
    .report-label{color:#64748b;}
    .report-value{text-align:right;font-weight:700;font-family:monospace;}
    .report-total{background:#f0fdf4;font-weight:700;border-top:2px solid #22c55e;border-bottom:2px solid #22c55e;}
    .credit-block{padding:10px 14px;font-size:12px;}

function exportPDF(tab){
  const prevTab=S.tab;
  S.tab=tab;
  const titles={PURCHASE:'Purchase',SALES:'Sales',BALANCE:'Balance',EXPENSE:'Expense'};
  // Temporarily render chosen tab into a hidden area and print
  const pa=document.getElementById('report-print-area');
  // Re-render in a temporary container
  const tmpThead=document.createElement('thead');
  const tmpTbody=document.createElement('tbody');
  const tmpExtras=document.createElement('div');

  // Temporarily swap DOM refs — easiest approach: render to real table, capture, print
  const thead=document.getElementById('thead');
  const tbody=document.getElementById('tbody');
  const extras=document.getElementById('extras');
  const savedHead=thead.innerHTML,savedBody=tbody.innerHTML,savedExtras=extras.innerHTML;
  const savedSheetTitle=document.getElementById('sheet-title').textContent;

  S.tab=tab;S.filters={};
  renderTable();

    td{border-bottom:1px solid #e2e8f0;padding:8px 10px;}
    .num,.num-pad{text-align:right;font-family:monospace;}
    .summary-row td{background:#f0fdf4;font-weight:700;}
    .row-incomplete td{background:#fff1f1;}
    .hdr-filter,.del-btn,.resize-handle{display:none!important;}
    input,select{border:none;background:transparent;width:100%;font-family:inherit;}
  </style>
  <h2>POWER-IMS — ${titles[tab]||tab}</h2>
  <p style="font-size:11px;color:#64748b;margin-bottom:10px">Printed: ${new Date().toLocaleString()} | User: ${S.user}</p>
  <table><thead>${capturedHead}</thead><tbody>${capturedBody}</tbody></table>`;

  window.print();

  setTimeout(()=>{
    pa.innerHTML='';
    thead.innerHTML=savedHead;

    extras.innerHTML=savedExtras;

    document.getElementById('sheet-title').textContent=savedSheetTitle;

}

/* ======================================================
   KEYBOARD NAV
====================================================== */
document.addEventListener('keydown',e=>{
  const el=document.activeElement;
  if(!el||(el.tagName!=='INPUT'&&el.tagName!=='SELECT'))return;
  const inputs=[...document.querySelectorAll('tbody input:not([readonly]),tbody select:not([disabled])')];
  const ci=inputs.indexOf(el);if(ci<0)return;
  const row=el.closest('tr');
  const nc=row?[...row.querySelectorAll('input:not([readonly]),select:not([disabled])')].length:1;
  const mv={ArrowDown:nc,ArrowUp:-nc,Enter:nc};
  if(e.key in mv){const ni=ci+mv[e.key];if(ni>=0&&ni<inputs.length){e.preventDefault();inputs[ni].focus();}}
  if(e.key==='ArrowRight'&&(el.tagName==='SELECT'||el.selectionEnd===el.value.length))
    {if(ci+1<inputs.length)inputs[ci+1].focus();}
  if(e.key==='ArrowLeft'&&(el.tagName==='SELECT'||el.selectionStart===0))
    {if(ci-1>=0)inputs[ci-1].focus();}
});

  // Ensure admin exists
  const reg=getRegistry();

  const saved=localStorage.getItem('ims_currentUser');
  if(saved&&getRegistry()[saved]){doLogin(saved);return;}
  openModal('auth-modal');
}
init();
